<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="가사 글자 위에 계단식 멜로디 선과 바이브레이션 숫자를 그려 넣는 편집기">
<title>가사 멜로디 표기</title>
<style>
  :root {
    --bg: #F4F3EF;
    --paper: #FCFBF8;
    --ink: #1C1C21;
    --muted: #74747E;
    --edge: #DDDBD3;
    --accent: #2B5FD9;
    --accent-ink: #FFFFFF;
    --accent-soft: rgba(43, 95, 217, .12);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141416;
      --paper: #1D1D21;
      --ink: #EAEAE6;
      --muted: #8F8F98;
      --edge: #33333A;
      --accent: #7AA0F5;
      --accent-ink: #101014;
      --accent-soft: rgba(122, 160, 245, .16);
    }
  }
  :root[data-theme="light"] {
    --bg: #F4F3EF;
    --paper: #FCFBF8;
    --ink: #1C1C21;
    --muted: #74747E;
    --edge: #DDDBD3;
    --accent: #2B5FD9;
    --accent-ink: #FFFFFF;
    --accent-soft: rgba(43, 95, 217, .12);
  }
  :root[data-theme="dark"] {
    --bg: #141416;
    --paper: #1D1D21;
    --ink: #EAEAE6;
    --muted: #8F8F98;
    --edge: #33333A;
    --accent: #7AA0F5;
    --accent-ink: #101014;
    --accent-soft: rgba(122, 160, 245, .16);
  }

  * { box-sizing: border-box; scrollbar-width: thin; scrollbar-color: var(--edge) transparent; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--edge); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  ::-webkit-scrollbar-corner { background: transparent; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", "Noto Sans KR", system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }
  .app { max-width: 980px; margin: 0 auto; padding: 0 16px 48px; }

  .toolbar {
    position: sticky; top: 0; z-index: 5;
    display: flex; flex-direction: column; gap: 10px;
    background: var(--bg);
    padding: 14px 0 12px;
    border-bottom: 1px solid var(--edge);
  }
  .brand { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .brand strong { font-size: 15px; font-weight: 700; letter-spacing: .01em; }
  .brand span { font-size: 12px; color: var(--muted); }

  .songnav { display: flex; gap: 6px; align-items: stretch; min-width: 0; }
  .song-picker-btn {
    display: grid; grid-template-columns: minmax(0, 1fr) auto; column-gap: 8px;
    min-width: 210px; max-width: 410px; text-align: left; padding: 6px 10px;
  }
  .song-picker-btn .song-current-title {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    color: var(--ink); font-size: 13px; font-weight: 650;
  }
  .song-picker-btn .song-current-state {
    grid-column: 1; color: var(--muted); font-size: 10.5px; line-height: 1.2;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .song-picker-btn .song-caret { grid-column: 2; grid-row: 1 / span 2; align-self: center; color: var(--muted); }
  .song-dialog {
    width: min(520px, calc(100vw - 28px)); max-height: min(680px, 82dvh);
    padding: 0; color: var(--ink); background: var(--paper);
    border: 1px solid var(--edge); border-radius: 12px; box-shadow: 0 22px 64px rgba(0,0,0,.24);
  }
  .song-dialog::backdrop { background: rgba(10, 10, 15, .45); }
  .song-dialog-head {
    position: sticky; top: 0; z-index: 1;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 14px 16px; background: var(--paper); border-bottom: 1px solid var(--edge);
  }
  .song-dialog-head strong { font-size: 15px; }
  .song-dialog-actions { display: flex; gap: 6px; }
  .song-list { margin: 0; padding: 8px; list-style: none; overflow-y: auto; }
  .song-row {
    display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 6px; align-items: center;
    padding: 4px; border-radius: 8px;
  }
  .song-row.active { background: var(--accent-soft); }
  .song-select {
    display: grid; grid-template-columns: 18px minmax(0, 1fr); gap: 0 8px; align-items: center;
    min-width: 0; min-height: 48px; padding: 5px 7px; border: 0; border-radius: 7px;
    text-align: left; color: var(--ink); background: transparent; cursor: pointer;
  }
  .song-select:hover { background: color-mix(in srgb, var(--accent-soft) 65%, transparent); }
  .song-check { grid-row: 1 / span 2; color: var(--accent); font-weight: 700; text-align: center; }
  .song-row-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; font-weight: 650; }
  .song-row-meta { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 10.5px; color: var(--muted); }
  .song-more { min-width: 40px; min-height: 40px; padding: 4px 9px; font-size: 17px; }
  .song-menu {
    grid-column: 1 / -1; display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 5px;
    padding: 0 4px 5px;
  }
  .song-empty { padding: 28px 18px; text-align: center; color: var(--muted); }
  .print-song-title { display: none; }

  .lyrics-row { display: flex; gap: 8px; align-items: stretch; }
  textarea {
    font: inherit; color: var(--ink);
    background: var(--paper);
    border: 1px solid var(--edge); border-radius: 6px;
    padding: 8px 10px; resize: vertical; width: 100%;
  }
  textarea:focus-visible { outline: 2px solid var(--accent); outline-offset: -1px; }
  #lyricsIn { flex: 1; min-height: 40px; }

  .actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .group { display: flex; gap: 4px; }
  .btn {
    font: inherit; font-size: 12.5px;
    padding: 5px 10px;
    border: 1px solid var(--edge); border-radius: 6px;
    background: var(--paper); color: var(--ink);
    cursor: pointer;
    transition: border-color .12s, color .12s, background .12s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
  .btn.primary:hover { color: var(--accent-ink); filter: brightness(1.06); }
  .status {
    margin-left: auto;
    font-size: 12px; color: var(--muted);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  .tplrow { display: flex; flex-wrap: wrap; gap: 6px; align-items: stretch; }
  .tpllabel { font-size: 11px; color: var(--muted); align-self: center; margin-right: 2px; }
  .tpl {
    position: relative;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 2px;
    font: inherit; padding: 4px 5px 3px;
    border: 1px solid var(--edge); border-radius: 6px;
    background: var(--paper); color: var(--ink);
    cursor: pointer;
    transition: border-color .12s, color .12s;
  }
  .tpl:hover { border-color: var(--accent); color: var(--accent); }
  .tpl:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .tpl span { font-size: 9.5px; color: var(--muted); line-height: 1.2; white-space: nowrap; }
  .tpl:hover span { color: var(--accent); }
  .tpl svg { display: block; }
  .tpl .x {
    position: absolute; top: -6px; right: -6px;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--edge); color: var(--ink);
    font-size: 10px; line-height: 14px; text-align: center;
  }
  .tpl .x:hover { background: var(--accent); color: var(--accent-ink); }

  main { padding-top: 20px; }
  .sheet {
    background: var(--paper);
    border: 1px solid var(--edge); border-radius: 8px;
    padding: 22px 22px 16px;
    min-height: 150px;
    display: flex; flex-direction: column; gap: 24px;
  }
  .cells {
    display: flex; flex-wrap: wrap; align-items: flex-end;
    column-gap: 2px; row-gap: 24px;
    padding-bottom: 2px;
  }
  .word { flex: none; display: flex; align-items: flex-end; gap: 2px; }
  .sp { flex: none; height: 8px; }
  .emptyline { height: 22px; }
  .cell {
    flex: none;
    display: flex; flex-direction: column; align-items: center;
    cursor: pointer;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
  }
  .cell svg { display: block; }
  .cell.sustain { cursor: default; }
  .cell.sustain .ch { color: var(--muted); }
  .ch {
    width: 100%;
    text-align: center;
    font-size: 17px; line-height: 1.3;
    padding: 1px 0 3px;
    border-radius: 4px;
  }
  .cell.sel .ch { color: var(--accent); background: var(--accent-soft); font-weight: 600; }

  .contour { fill: none; stroke: var(--ink); stroke-width: 1.6; stroke-linejoin: miter; stroke-linecap: square; }
  .contour.selseg { stroke: var(--accent); stroke-width: 2.4; }
  text.vib { font-size: 9.5px; fill: var(--ink); text-anchor: middle; font-variant-numeric: tabular-nums; }
  text.vib.selv { fill: var(--accent); font-weight: 700; }

  .help { font-size: 12px; color: var(--muted); margin: 12px 2px 0; }
  .io { margin-top: 18px; font-size: 12.5px; color: var(--muted); }
  .io summary { cursor: pointer; }
  .io textarea { margin-top: 8px; font-size: 12px; font-family: ui-monospace, monospace; }
  .iobtns { display: flex; gap: 6px; margin-top: 6px; }

  [hidden] { display: none !important; }

  .tabs { display: flex; gap: 6px; }
  .tab {
    font: inherit; font-size: 13px;
    padding: 5px 14px;
    border: 1px solid var(--edge); border-radius: 6px;
    background: transparent; color: var(--muted);
    cursor: pointer;
  }
  .tab.active { background: var(--paper); color: var(--ink); border-color: var(--accent); }
  .tab:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }

  .audioname {
    font-size: 12px; color: var(--muted);
    align-self: center; flex: 1; min-width: 120px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .recordbar {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    padding: 7px 9px;
    background: var(--paper);
    border: 1px solid var(--edge); border-radius: 7px;
  }
  .recordbar .record-note {
    font-size: 11.5px; color: var(--muted);
    flex: 1; min-width: 210px;
  }
  .recordbar audio { width: min(280px, 100%); height: 32px; }
  .recordbar .gridlab { cursor: pointer; }
  .btn.recording {
    background: #B42318; border-color: #B42318; color: #fff;
  }
  .btn.recording:hover { color: #fff; filter: brightness(1.08); }
  .btn:disabled { opacity: .5; cursor: default; }
  .btn:disabled:hover { border-color: var(--edge); color: var(--ink); filter: none; }
  .sr-only {
    position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
  }
  .queue { display: flex; gap: 3px; align-items: center; flex-wrap: wrap; font-size: 13px; }
  .queue .qlab { font-size: 11px; color: var(--muted); margin-right: 4px; }
  .queue .q { padding: 1px 6px; border: 1px solid var(--edge); border-radius: 4px; color: var(--muted); }
  .queue .q.first { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); font-weight: 700; }

  .tl-wrap { display: flex; gap: 6px; align-items: stretch; }
  .tl-labels { position: relative; flex: none; width: 62px; }
  .tl-labels .lanebtn {
    position: absolute; left: 0; right: 0; z-index: 2;
    font: inherit; font-size: 10.5px;
    padding: 2px 8px;
    border: 1px solid var(--edge); border-radius: 5px;
    background: var(--paper); color: var(--muted);
    cursor: pointer;
  }
  .tl-labels .lanebtn.on { border-color: var(--accent); color: var(--accent); }
  .tl-labels .lanebtn:disabled { opacity: .4; cursor: default; }
  .tl-labels .lanebtn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .timepane .tl-scroll {
    position: relative; overflow-x: auto;
    flex: 1; min-width: 0;
    background: var(--paper);
    border: 1px solid var(--edge); border-radius: 8px;
    height: 184px;
    overflow-y: hidden;
  }
  .tl-inner { position: relative; height: 100%; cursor: grab; touch-action: pan-y; }
  .tl-inner.panning { cursor: grabbing; }
  #grid { position: absolute; top: 0; left: 0; display: block; }
  #wave { position: absolute; top: 0; left: 0; display: block; }
  #timeControls { flex-wrap: wrap; }
  .gridlab {
    display: flex; align-items: center; gap: 4px;
    font-size: 11.5px; color: var(--muted); white-space: nowrap;
  }
  .gridlab input[type="number"] {
    width: 66px; font: inherit; font-size: 12px;
    padding: 3px 6px; border: 1px solid var(--edge); border-radius: 5px;
    background: var(--paper); color: var(--ink);
  }
  .gridlab input[type="number"]:focus-visible { outline: 2px solid var(--accent); outline-offset: -1px; }
  .ytin {
    flex: 1; min-width: 160px;
    font: inherit; font-size: 12.5px;
    padding: 6px 10px;
    border: 1px solid var(--edge); border-radius: 6px;
    background: var(--paper); color: var(--ink);
  }
  .ytin:focus-visible { outline: 2px solid var(--accent); outline-offset: -1px; }
  .tl-syls { position: absolute; top: 98px; left: 0; right: 0; bottom: 0; }
  .tl-syl {
    position: absolute; bottom: 0;
    display: flex; flex-direction: column; align-items: flex-start;
    padding-left: 3px; padding-bottom: 3px;
    border-left: 1px dashed var(--edge);
    cursor: grab;
    user-select: none; -webkit-user-select: none; touch-action: none;
  }
  .tl-syl .tch { font-size: 14px; line-height: 1.2; }
  .tl-syl.sel { border-left: 1px solid var(--accent); }
  .tl-syl.sel .tch { color: var(--accent); font-weight: 700; }
  .tl-syl.now { border-left: 2px solid var(--accent); }
  .tl-syl.now .tch { color: var(--accent); }
  .tlx {
    position: absolute; top: -6px; right: -7px;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--edge); color: var(--ink);
    font-size: 9px; line-height: 14px; text-align: center;
    cursor: pointer;
  }
  .tlx:hover { background: var(--accent); color: var(--accent-ink); }
  .playhead {
    position: absolute; top: 0; bottom: 0; width: 2px;
    background: var(--accent);
    pointer-events: none;
  }

  .gate {
    position: fixed; inset: 0; z-index: 50;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
  }
  .gate-card {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    background: var(--paper);
    border: 1px solid var(--edge); border-radius: 10px;
    padding: 40px 52px;
    max-width: min(520px, calc(100vw - 32px));
  }
  .gate-card strong { font-size: 18px; letter-spacing: .01em; }
  .gate-card p { margin: 0; font-size: 12.5px; color: var(--muted); text-align: center; white-space: pre-line; }
  .gate-card .iobtns { justify-content: center; flex-wrap: wrap; }
  .gate-card .btn { font-size: 13.5px; padding: 8px 18px; }

  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }

  @media (max-width: 700px) {
    .app { padding-left: 10px; padding-right: 10px; }
    .toolbar { padding-top: 8px; gap: 8px; }
    .brand > strong, .brand > span { display: none; }
    .songnav { order: -1; flex: 1 1 100%; }
    .song-picker-btn { min-width: 0; max-width: none; flex: 1; min-height: 46px; }
    .songnav > #newSongBtn { min-width: 46px; font-size: 0; }
    .songnav > #newSongBtn::after { content: '＋'; font-size: 19px; }
    .tabs { width: 100%; margin-left: 0 !important; }
    .tabs .tab { flex: 1; min-height: 40px; }
    .actions { gap: 6px; }
    .song-dialog { width: 100vw; max-width: none; max-height: 80dvh; margin: auto 0 0; border-radius: 14px 14px 0 0; border-bottom: 0; }
    .song-row { padding: 3px; }
    .song-select { min-height: 52px; }
  }

  @media print {
    :root, :root[data-theme="dark"] {
      --bg: #fff; --paper: #fff; --ink: #000; --muted: #555;
      --edge: #fff; --accent: #000; --accent-soft: transparent;
    }
    .toolbar, .help, .io, .song-dialog { display: none !important; }
    .app { max-width: none; padding: 0; }
    .print-song-title { display: block; margin: 0 0 18px; font-size: 18px; }
    .sheet { border: none; padding: 0; }
    .cell.sel .ch { font-weight: 400; background: none; }
    .contour.selseg { stroke-width: 1.6; }
  }
</style>
</head>
<body>

<div id="gate" class="gate">
  <div class="gate-card">
    <strong>가사 멜로디 표기</strong>
    <p id="gateMsg">로그인 확인 중…</p>
    <div class="iobtns">
      <button class="btn primary" id="gateLogin" style="display:none">Google로 로그인</button>
      <button class="btn primary" id="gateCloud" style="display:none">클라우드 작업 사용</button>
      <button class="btn" id="gateLocal" style="display:none">이 PC 작업 사용</button>
      <button class="btn primary" id="gateBoth" style="display:none">둘 다 보관</button>
      <button class="btn primary" id="gateRetry" style="display:none">다시 시도</button>
      <a class="btn primary" id="gateHosted" href="https://lyric-melody.vercel.app/" style="display:none;text-decoration:none">웹 앱 열기</a>
      <button class="btn" id="gateOffline" style="display:none">오프라인으로 계속</button>
    </div>
  </div>
</div>

<div class="app" id="appRoot" inert>
  <header class="toolbar">
    <div class="brand">
      <strong>가사 멜로디 표기</strong>
      <span>글자 위에 계단 음을 그리는 편집기</span>
      <div class="songnav">
        <button class="btn song-picker-btn" id="songPickerBtn" type="button" aria-haspopup="dialog">
          <span class="song-current-title" id="songCurrentTitle">곡 불러오는 중…</span>
          <span class="song-current-state" id="songCurrentState">이 기기에서 준비 중</span>
          <span class="song-caret" aria-hidden="true">⌄</span>
        </button>
        <button class="btn" id="newSongBtn" type="button">＋ 새 곡</button>
      </div>
      <div class="tabs" style="margin-left:auto">
        <button class="tab active" data-tab="edit">악보 편집</button>
        <button class="tab" data-tab="time">타임라인</button>
      </div>
    </div>
    <div class="lyrics-row" id="lyricsRow">
      <textarea id="lyricsIn" rows="2" placeholder="가사를 입력하고 [가사 적용]을 누르세요 (줄바꿈으로 여러 줄 가능)"></textarea>
      <button id="applyBtn" class="btn primary">가사 적용</button>
    </div>
    <div class="actions" id="actions">
      <div class="group">
        <button class="btn" data-act="prev" title="이전 음 (←)">◀ 이전</button>
        <button class="btn" data-act="next" title="다음 음 (→)">다음 ▶</button>
      </div>
      <div class="group">
        <button class="btn" data-act="up" title="위 계단 (↑) — 마지막 음에서 누르면 연음 자동 추가">▲ 위 계단</button>
        <button class="btn" data-act="down" title="아래 계단 (↓) — 마지막 음에서 누르면 연음 자동 추가">▼ 아래 계단</button>
      </div>
      <div class="group">
        <button class="btn" data-act="add" title="연음 추가 (Enter)">＋ 연음</button>
        <button class="btn" data-act="del" title="음 삭제 (Delete)">－ 삭제</button>
      </div>
      <div class="group">
        <button class="btn" data-act="vnUp" title="바이브레이션 숫자 +1 (1~9 키로 바로 지정)">바이브 ＋</button>
        <button class="btn" data-act="vnDown" title="바이브레이션 숫자 -1 (0 키로 지우기)">바이브 －</button>
      </div>
      <div class="group">
        <button id="saveBtn" class="btn" title="지금 상태를 클라우드에 즉시 저장">저장</button>
        <button id="printBtn" class="btn">인쇄</button>
        <button id="resetBtn" class="btn" title="현재 선택한 곡의 악보만 초기화합니다">현재 곡 초기화</button>
      </div>
      <span id="status" class="status"></span>
    </div>
    <div class="tplrow" id="tplRow"></div>
    <div class="lyrics-row" id="timeControls" hidden>
      <label class="btn" for="fileOrig">원곡 불러오기</label>
      <input type="file" id="fileOrig" accept="audio/*" style="display:none">
      <label class="btn" for="fileMr">MR 불러오기</label>

<script>
(function () {
  'use strict';

  var KEY = 'lyric-melody-v1';
  var KEY_USER_PREFIX = 'lyric-melody-user-v1:';
  var KEY_DIRTY_PREFIX = 'lyric-melody-dirty-v1:';
  var KEY_LAST_USER = 'lyric-melody-last-user-v1';
  var KEY_AUDIO_OWNER_PREFIX = 'lyric-melody-audio-owner-v2:';
  var KEY_LIBRARY_PREFIX = 'lyric-melody-library-v3:';
  var KEY_SONG_PREFIX = 'lyric-melody-song-v3:';
  var KEY_SONG_DIRTY_PREFIX = 'lyric-melody-song-dirty-v3:';
  var KEY_LEGACY_MIGRATION_PREFIX = 'lyric-melody-legacy-migrated-v3:';
  var KEY_AUDIO_RECOVERY_BLOCK_PREFIX = 'lyric-melody-audio-recovery-block-v3:';
  var LEGACY_SONG_ID = 'legacy-main';
  var STEP = 7, NOTE_W = 6;

  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
  function esc(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  var $ = function (id) { return document.getElementById(id); };
  var sheet = $('sheet'), statusEl = $('status'), lyricsIn = $('lyricsIn'), jsonIo = $('jsonIo');

  /* ---------- 데이터 ----------
     음(note): { d: 1|-1 (앞 음보다 위/아래, 첫 음은 0), vn: 바이브레이션 숫자(0=없음) }
     글자(cell): { ch, notes: [note, ...] }  — 음은 항상 1개 이상, 1개면 계단을 그리지 않음 */

  function newNote(d, vn) { return { d: d || 0, vn: vn || 0 }; }

  /* 같은 방향으로 4음(연속 3계단) 이상 이어지는지 — 신체 구조상 불가 규칙 */
  function dirRunTooLong(notes) {
    var run = 0, last = 0;
    for (var i = 1; i < notes.length; i++) {
      var d = notes[i].d < 0 ? -1 : 1;
      run = d === last ? run + 1 : 1;
      last = d;
      if (run >= 3) return true;
    }
    return false;
  }

  function linesFrom(text, old) {
    return String(text).split('\n').map(function (lineStr, li) {
      return Array.from(lineStr).map(function (ch, ci) {
        if (ch === ' ' || ch === '　') return { ch: ' ', space: true };
        if (ch === '-' || ch === '－') return { ch: '-', sustain: true };
        var o = old && old[li] && old[li][ci];
        if (o && !o.space && !o.sustain && o.ch === ch) return o;
        return { ch: ch, notes: [newNote()] };
      });
    });
  }

  function sampleDoc() {
    var d = {
      lyrics: [
        '땅은 하늘이 되고 지구가 달을 돌고',
        '옳은 건 다 틀린 게 되고 모든 게 다 제멋대로 움직이고 있어',
        '시간은 끝없이 영원해지기도 눈 깜짝할 사이에 사라지기도 해',
        '네가 나타났을 때 전부 뒤바뀐 거야',
        '뭔가 잘못됐어 단단히 설명할 수도 없이',
        '모든 게 달라진 거야 너를 처음 본 그 순간',
        '네가 내 이름 불러줄 때 믿어왔던 모든 게 무너진 거야',
        '내가 왜 이런지 모르겠어 네가 말하는 세상',
        '이젠 그게 맞는 거야 내겐 그게 전부야',
        '넌 내 세상이니까 어떤 이유도 필요 없는 거야',
        '너는 날 뒤흔들고 내 우주를 조종해',
        '흐트러진 중력에 힘을 빼앗긴 채 어디로 가야 할지',
        '길을 잃은 것만 같아 뭔가 잘못됐어 단단히',
        '설명할 수도 없이 모든 게 달라진 거야',
        '너를 처음 본 그 순간 네가 내 이름 불러줄 때 믿어왔던',
        '모든 게 무너진 거야 내가 왜 이런지 모르겠어',
        '눈앞이 아득해져 어긋나는 초점 사이로',
        '선명히 다가오는 너 뭔가 잘못됐어 내 마음이',
        '벗어날 수도 없이 사랑에 빠져버렸어',
        '네가 내게 온 그 순간부터 난 너에게 달렸어',
        '이제부터 모든 게 달라질 거야',
        '난 네 사람이니까 넌 내 세상이니까'
      ].join('\n')
    };
    d.lines = linesFrom(d.lyrics);
    d.bpm = 123.05;   /* 권진아 - 뭔가 잘못됐어 (Rock VER.) 자동 측정값 */
    d.gridOff = 1.72;
    return d;
  }

  function normalizeDoc(d) {
    if (!d || !Array.isArray(d.lines)) return null;
    d.lines = d.lines.map(function (line) {
      if (!Array.isArray(line)) return [];
      return line.map(function (c) {
        if (!c || c.space) return { ch: ' ', space: true };
        if (c.sustain) return { ch: '-', sustain: true };
        var raw = Array.isArray(c.notes) ? c.notes : [];
        var prevLv = null;
        var notes = raw.map(function (n, i) {
          n = n || {};
          var dir;
          if (typeof n.d === 'number') {
            dir = i === 0 ? 0 : (n.d < 0 ? -1 : 1);
          } else if (typeof n.lv === 'number') {
            /* 이전 버전(절대 높이) 데이터 변환 */
            dir = i === 0 ? 0 : (n.lv < prevLv ? -1 : 1);
          } else {
            dir = i === 0 ? 0 : 1;
          }
          if (typeof n.lv === 'number') prevLv = n.lv;
          var vn = typeof n.vn === 'number' ? Math.max(0, Math.round(n.vn))
            : (typeof n.vib === 'number' ? Math.max(0, Math.round(n.vib)) : 0);
          return { d: dir, vn: vn };
        });
        if (!notes.length) notes = [newNote()];
        var out = { ch: String(c.ch || '·'), notes: notes };
        if (typeof c.t === 'number') out.t = c.t;
        return out;
      });
    });
    if (typeof d.lyrics !== 'string') {
      d.lyrics = d.lines.map(function (l) {
        return l.map(function (c) { return c.ch; }).join('');
      }).join('\n');
    }
    /* 격자 기본값 (권진아 - 뭔가 잘못됐어 Rock VER. 측정값) */
    if (!(typeof d.bpm === 'number' && d.bpm > 0)) d.bpm = 123.05;
    if (typeof d.gridOff !== 'number') d.gridOff = 1.72;
    return d;
  }

  function emptyDoc() {
    return {
      lyrics: '', lines: [[]], bpm: 120, gridOff: 0,
      customTpls: typeof customTpls !== 'undefined' ? normalizeTpls(customTpls) : []
    };
  }

  function safeSongId(id) { return /^[A-Za-z0-9_-]{1,64}$/.test(String(id || '')); }
  function newSongId() {
    var raw = window.crypto && typeof window.crypto.randomUUID === 'function'
      ? window.crypto.randomUUID()
      : (Date.now().toString(36) + '-' + Math.random().toString(36).slice(2));
    return ('song-' + raw).replace(/[^A-Za-z0-9_-]/g, '-').slice(0, 64);
  }
  function normalizeSongTitle(value) {
    var title = String(value || '').replace(/\s+/g, ' ').trim();
    return (title || '제목 없는 곡').slice(0, 80);
  }
  function suggestedSongTitle(value, fallback) {
    var source = value && typeof value.lyrics === 'string' ? value.lyrics : '';
    var first = source.split('\n').map(function (line) { return line.trim(); })
      .find(function (line) { return !!line; });
    return normalizeSongTitle(first ? first.slice(0, 36) : (fallback || '제목 없는 곡'));
  }
  function libraryKey(owner) { return KEY_LIBRARY_PREFIX + (owner || 'local'); }
  function songDocKey(owner, songId) { return KEY_SONG_PREFIX + (owner || 'local') + ':' + songId; }
  function songDirtyKey(uid, songId) { return KEY_SONG_DIRTY_PREFIX + uid + ':' + songId; }

  function blankLibrary(owner) {
    return { schemaVersion: 3, owner: owner || 'local', activeSongId: null, songs: [] };
  }
  function normalizeSongMeta(meta) {
    if (!meta || !safeSongId(meta.id)) return null;
    var normalized = {
      id: String(meta.id),
      title: normalizeSongTitle(meta.title),
      mtime: typeof meta.mtime === 'number' ? meta.mtime : 0,
      createdAt: typeof meta.createdAt === 'number' ? meta.createdAt : 0,
      archived: !!meta.archived,
      sync: typeof meta.sync === 'string' ? meta.sync : ''
    };
    if (safeSongId(meta.recoverySourceId) && typeof meta.recoverySourceHash === 'string' &&
        meta.recoverySourceHash.length > 0 && meta.recoverySourceHash.length <= 256) {
      normalized.recoverySourceId = String(meta.recoverySourceId);
      normalized.recoverySourceHash = meta.recoverySourceHash;
    }
    return normalized;
  }
  function loadSongLibrary(owner) {
    var lib = blankLibrary(owner);
    try {
      var parsed = JSON.parse(localStorage.getItem(libraryKey(owner)));
      if (!parsed || parsed.schemaVersion !== 3 || !Array.isArray(parsed.songs)) return lib;
      var seen = {};
      parsed.songs.forEach(function (item) {
        var meta = normalizeSongMeta(item);
        if (!meta || seen[meta.id]) return;
        seen[meta.id] = true;
        lib.songs.push(meta);
      });
      lib.activeSongId = safeSongId(parsed.activeSongId) ? parsed.activeSongId : null;
    } catch (e) {}
    return lib;
  }
  function saveSongLibrary(owner) {
    owner = owner || 'local';
    try {
      var cleanSongs = songLibrary.songs.map(function (meta) {
        var clean = {
          id: meta.id, title: normalizeSongTitle(meta.title), mtime: meta.mtime || 0,
          createdAt: meta.createdAt || 0, archived: !!meta.archived
        };
        if (safeSongId(meta.recoverySourceId) && typeof meta.recoverySourceHash === 'string') {
          clean.recoverySourceId = meta.recoverySourceId;
          clean.recoverySourceHash = meta.recoverySourceHash.slice(0, 256);
        }
        return clean;
      });
      localStorage.setItem(libraryKey(owner), JSON.stringify({
        schemaVersion: 3,
        activeSongId: activeSongId,
        songs: cleanSongs
      }));
      return true;
    } catch (e) { return false; }
  }
  function loadSongDoc(owner, songId) {
    try { return normalizeDoc(JSON.parse(localStorage.getItem(songDocKey(owner, songId)))); }
    catch (e) { return null; }
  }
  function writeSongDoc(owner, songId, nextDoc) {
    try {
      var raw = JSON.stringify(nextDoc);
      localStorage.setItem(songDocKey(owner, songId), raw);
      return raw;
    } catch (e) { return null; }
  }
  function currentLibraryOwner() {
    return (typeof fb !== 'undefined' && fb && fb.user) ? fb.user.uid : 'local';
  }
  function songMetaById(songId) {
    return songLibrary.songs.find(function (meta) { return meta.id === songId; }) || null;
  }
  function ensureSongMeta(songId, title, mtime, createdAt) {
    var meta = songMetaById(songId);
    if (!meta) {
      meta = {
        id: songId,
        title: normalizeSongTitle(title),
        mtime: mtime || 0,
        createdAt: createdAt || Date.now(),
        archived: false,
        sync: ''
      };
      songLibrary.songs.push(meta);
    }
    return meta;
  }

  function load() {
    try {
      var d = normalizeDoc(JSON.parse(localStorage.getItem(KEY)));
      if (d) {
        /* 예전 한 줄짜리 예시 문서면 전체 가사로 교체 */
        if (d.lyrics === '뭔가 잘못됐어 내 마음이') return sampleDoc();
        return d;
      }
    } catch (e) {}
    return sampleDoc();
  }
  function userDocKey(uid) { return KEY_USER_PREFIX + uid; }
  function userDirtyKey(uid) { return KEY_DIRTY_PREFIX + uid; }
  function docFingerprint(raw) {
    raw = String(raw || '');
    var h1 = 2166136261, h2 = 5381;
    for (var i = 0; i < raw.length; i++) {
      var code = raw.charCodeAt(i);
      h1 = Math.imul(h1 ^ code, 16777619);
      h2 = Math.imul(h2, 33) ^ code;
    }
    return 'v2:' + raw.length + ':' + (h1 >>> 0).toString(36) + ':' + (h2 >>> 0).toString(36);
  }
  function userDirtyToken(uid, songId) {
    try { return localStorage.getItem(songDirtyKey(uid, songId || activeSongId)); }
    catch (e) { return null; }
  }
  function loadUserDoc(uid) {
    try { return normalizeDoc(JSON.parse(localStorage.getItem(userDocKey(uid)))); }
    catch (e) { return null; }
  }
  function isUserDocDirty(uid, songId) {
    return !!userDirtyToken(uid, songId || activeSongId);
  }
  function anyUserSongDirty(uid) {
    return songLibrary.songs.some(function (meta) {
      return isUserDocDirty(uid, meta.id);
    });
  }
  function storeLocalDoc(markDirty) {
    try {
      var raw = JSON.stringify(doc);
      var owner = currentLibraryOwner();
      localStorage.setItem(songDocKey(owner, activeSongId), raw);
      var meta = ensureSongMeta(activeSongId, suggestedSongTitle(doc), doc.mtime, Date.now());
      meta.mtime = doc.mtime || meta.mtime || Date.now();
      saveSongLibrary(owner);
      if (typeof fb !== 'undefined' && fb && fb.user) {
        localStorage.setItem(KEY_LAST_USER, fb.user.uid);
        if (markDirty) localStorage.setItem(songDirtyKey(fb.user.uid, activeSongId), docFingerprint(raw));
      }
      renderSongLibrary();
    } catch (e) {}
  }
  function clearUserDocDirty(uid, expectedToken, songId) {
    songId = songId || activeSongId;
    try {
      if (expectedToken && localStorage.getItem(songDirtyKey(uid, songId)) === expectedToken) {
        localStorage.removeItem(songDirtyKey(uid, songId));
      }
    } catch (e) {}
  }
  function markUserDocClean(uid, syncedData, songId) {
    songId = songId || activeSongId;
    try {
      var dirtyKey = songDirtyKey(uid, songId);
      var dirty = localStorage.getItem(dirtyKey);
      if (!dirty) return;
      var matches = dirty === docFingerprint(syncedData);
      if (matches) localStorage.removeItem(dirtyKey);
    } catch (e) {}
  }
  function save() {
    doc.mtime = Date.now();
    storeLocalDoc(true);
    cloudAutoSave();
  }

  var bootstrapDoc = load();
  var songLibrary = loadSongLibrary('local');
  if (!songLibrary.songs.length) {
    songLibrary.songs.push({
      id: LEGACY_SONG_ID,
      title: suggestedSongTitle(bootstrapDoc, '기존 작업'),
      mtime: bootstrapDoc.mtime || 0,
      createdAt: Date.now(),
      archived: false,
      sync: ''
    });
    songLibrary.activeSongId = LEGACY_SONG_ID;
  }
  var activeSongId = songLibrary.activeSongId && songMetaById(songLibrary.activeSongId)
    ? songLibrary.activeSongId : songLibrary.songs[0].id;
  var doc = loadSongDoc('local', activeSongId) || bootstrapDoc;
  writeSongDoc('local', activeSongId, doc);
  saveSongLibrary('local');
  var songSwitchGeneration = 0, openSongMenuId = null, songAudioCopyPromises = {};
  var sel = null, drag = null, flashTimer = null;

  function nonSpacePositions() {
    var arr = [];
    doc.lines.forEach(function (line, li) {
      line.forEach(function (c, ci) { if (!c.space && !c.sustain) arr.push({ li: li, ci: ci }); });
    });
    return arr;
  }
  function firstSel() {
    var p = nonSpacePositions()[0];
    return p ? { li: p.li, ci: p.ci, ni: 0 } : null;
  }
  function cellAt(s) { return doc.lines[s.li] && doc.lines[s.li][s.ci]; }

  /* ---------- 그리기 ---------- */

  function cellGeom(cell) {
    var notes = cell.notes, n = notes.length;
    var o = [0], i;
    for (i = 1; i < n; i++) o.push(o[i - 1] + (notes[i].d < 0 ? -1 : 1));
    var min = Math.min.apply(null, o), max = Math.max.apply(null, o);
    var anyV = notes.some(function (nt) { return nt.vn > 0; });
    var topPad = anyV ? 16 : 6;
    var H = (max - min) * STEP + topPad + 4;
    var w = Math.max(30, n * NOTE_W + 12);
    return { o: o, min: min, H: H, w: w };
  }

  /* alignLeft: 타임라인용 — 계단·숫자를 가운데가 아니라 글자 시작점(왼쪽) 기준으로 그림 */
  function glyphSVG(cell, selNi, alignLeft) {
    var notes = cell.notes, n = notes.length;
    var g = cellGeom(cell);
    var head = '<svg width="' + g.w + '" height="' + g.H + '" viewBox="0 0 ' + g.w + ' ' + g.H + '">';
    var body = '', selD = '', extras = '';
    var yOf = function (i) { return g.H - 4 - (g.o[i] - g.min) * STEP; };
    var base = alignLeft ? 2 : (g.w - n * NOTE_W) / 2;

    if (n >= 2) {
      var x0 = base, d = '', prevY = null;
      notes.forEach(function (nt, i) {
        var xs = x0 + i * NOTE_W, xe = xs + NOTE_W, y = yOf(i);
        d += (i === 0 ? 'M ' : 'L ') + xs + ' ' + y + ' L ' + xe + ' ' + y;
        if (i === selNi) {
          selD = 'M ' + xs + ' ' + (prevY === null ? y : prevY) + ' L ' + xs + ' ' + y + ' L ' + xe + ' ' + y;
        }
        prevY = y;
      });
      body = '<path class="contour" d="' + d + '"/>' +
        (selD ? '<path class="contour selseg" d="' + selD + '"/>' : '');
    }

    notes.forEach(function (nt, i) {
      if (!(nt.vn > 0)) return;
      var cx, y = yOf(i);
      if (n >= 2) {
        cx = base + i * NOTE_W + NOTE_W / 2;
      } else {
        cx = alignLeft ? 9 : g.w / 2;
      }
      extras += '<text class="vib' + (i === selNi ? ' selv' : '') + '" x="' + cx + '" y="' + (y - 5) + '">' + nt.vn + '</text>';
    });

    return head + body + extras + '</svg>';
  }

  function cellHTML(cell, li, ci) {
    var isSel = sel && sel.li === li && sel.ci === ci;
    var g = cellGeom(cell);
    return '<div class="cell' + (isSel ? ' sel' : '') + '" data-li="' + li + '" data-ci="' + ci + '" style="width:' + g.w + 'px">' +
      glyphSVG(cell, isSel ? sel.ni : -1) +
      '<div class="ch">' + esc(cell.ch) + '</div></div>';
  }

  /* 앞 글자의 마지막 음 높이를 그대로 이어 그리는 '길게 끌기' 칸.
     lift = 바닥 기준 높이(px), 음수면 이을 선이 없어 대시 글자만 표시 */
  function sustainHTML(lift) {
    var w = 16, H = lift >= 0 ? lift + 8 : 8;
    var y = H - 4 - (lift >= 0 ? lift : 0);
    var line = lift >= 0
      ? '<path class="contour" d="M 0 ' + y + ' L ' + w + ' ' + y + '"/>'
      : '';
    return '<div class="cell sustain" style="width:' + w + 'px"><svg width="' + w + '" height="' + H + '" viewBox="0 0 ' + w + ' ' + H + '">' + line + '</svg><div class="ch">-</div></div>';
  }

  function render() {
    sheet.innerHTML = doc.lines.map(function (line, li) {
      var parts = [], word = '', spaces = 0, lastGlyph = -1;
      var flushWord = function () {
        if (word) { parts.push('<div class="word">' + word + '</div>'); word = ''; }
      };
      var flushSpaces = function () {
        if (spaces) { parts.push('<div class="sp" style="width:' + (spaces * 12) + 'px"></div>'); spaces = 0; }
      };
      line.forEach(function (cell, ci) {
        if (cell.space) { flushWord(); spaces++; }
        else if (cell.sustain) {
          flushSpaces();
          word += sustainHTML(lastGlyph);
        }
        else {
          flushSpaces();
          word += cellHTML(cell, li, ci);
          var g = cellGeom(cell);
          lastGlyph = cell.notes.length >= 2 ? (g.o[g.o.length - 1] - g.min) * STEP : -1;
        }
      });
      flushWord(); flushSpaces();
      var inner = parts.length ? parts.join('') : '<div class="emptyline"></div>';
      return '<div class="line"><div class="cells">' + inner + '</div></div>';
    }).join('');
    statusUpdate();
  }

  function statusUpdate() {
    if (flashTimer) return;
    if (!sel) { statusEl.textContent = '가사를 입력한 뒤 글자를 클릭하세요'; return; }
    var cell = cellAt(sel);
    if (!cell) { statusEl.textContent = ''; return; }
    var nt = cell.notes[sel.ni];
    var dir = sel.ni === 0 ? '기준 음' : (nt.d < 0 ? '↓ 아래 계단' : '↑ 위 계단');
    var vib = nt.vn > 0 ? '바이브 ' + nt.vn : '바이브 없음';
    statusEl.textContent = "'" + cell.ch + "' · " + (sel.ni + 1) + '/' + cell.notes.length + '번째 음 · ' + dir + ' · ' + vib;
  }

  function flash(msg) {
    if (flashTimer) clearTimeout(flashTimer);
    statusEl.textContent = msg;
    flashTimer = setTimeout(function () { flashTimer = null; statusUpdate(); }, 2000);
  }

  function update() { render(); save(); }

  /* ---------- 편집 동작 ---------- */

  function moveSel(dir) {
    if (!sel) { sel = firstSel(); if (sel) render(); return; }
    var cell = cellAt(sel);
    var n = cell ? cell.notes.length : 0;
    if (dir > 0 && sel.ni < n - 1) { sel.ni++; }
    else if (dir < 0 && sel.ni > 0) { sel.ni--; }
    else {
      var pos = nonSpacePositions();
      var idx = pos.findIndex(function (p) { return p.li === sel.li && p.ci === sel.ci; });
      var t = pos[idx + dir];
      if (!t) return;
      var tc = doc.lines[t.li][t.ci];
      sel = { li: t.li, ci: t.ci, ni: dir > 0 ? 0 : tc.notes.length - 1 };
    }
    render();
  }
  function setDir(d) {
    if (!sel) return;
    var cell = cellAt(sel);
    if (!cell || cell.space) return;
    if (sel.ni === cell.notes.length - 1) {
      /* 마지막 음에서 ↑/↓ → 그 방향으로 연음 자동 추가 */
      cell.notes.push(newNote(d));
      if (dirRunTooLong(cell.notes)) {
        cell.notes.pop();
        flash('같은 방향으로는 3음까지만 이어집니다 (신체 구조상 한계).');
        return;
      }
      sel.ni = cell.notes.length - 1;
    } else if (sel.ni > 0) {
      var prevD = cell.notes[sel.ni].d;
      cell.notes[sel.ni].d = d;
      if (dirRunTooLong(cell.notes)) {
        cell.notes[sel.ni].d = prevD;
        flash('같은 방향으로는 3음까지만 이어집니다 (신체 구조상 한계).');
        return;
      }
    } else {
      flash('첫 음은 기준이라 방향이 없습니다.');
      return;
    }
    update();
  }
  function addNote() {
    if (!sel) return;
    var cell = cellAt(sel);
    if (!cell || cell.space) return;
    cell.notes.splice(sel.ni + 1, 0, newNote(1));
    if (dirRunTooLong(cell.notes)) {
      cell.notes[sel.ni + 1].d = -1;
      if (dirRunTooLong(cell.notes)) {
        cell.notes.splice(sel.ni + 1, 1);
        flash('같은 방향으로는 3음까지만 이어집니다 (신체 구조상 한계).');
        update();
        return;
      }
    }
    sel.ni++;
    update();
  }
  function delNote() {
    if (!sel) return;
    var cell = cellAt(sel);
    if (cell.notes.length > 1) {
      cell.notes.splice(sel.ni, 1);
      cell.notes[0].d = 0;
      sel.ni = clamp(sel.ni, 0, cell.notes.length - 1);
    } else {
      cell.notes[0] = newNote();
      flash('마지막 음은 지울 수 없어 표시만 지웠습니다.');
    }
    update();
  }
  /* 숫자키 연속 입력: 0.7초 안에 이어 누르면 두 자리(최대 99)로 결합 — 예: 1,2 → 12 */
  var lastDigitAt = 0;
  function bufferedDigit(d, getV, setV) {
    var now = Date.now();
    var base = (now - lastDigitAt < 700) ? (getV() || 0) : 0;
    lastDigitAt = now;
    setV(Math.min(99, base * 10 + d));
  }
  function vibNum(d) {
    if (!sel) return;
    var nt = cellAt(sel).notes[sel.ni];
    nt.vn = Math.max(0, Math.min(99, (nt.vn || 0) + d));
    update();
  }
  function vibSet(num) {
    if (!sel) return;
    cellAt(sel).notes[sel.ni].vn = num;
    update();
  }

  var acts = { prev: function () { moveSel(-1); }, next: function () { moveSel(1); },
    up: function () { setDir(1); }, down: function () { setDir(-1); },
    add: addNote, del: delNote,
    vnUp: function () { vibNum(1); }, vnDown: function () { vibNum(-1); } };

  document.querySelectorAll('[data-act]').forEach(function (btn) {
    btn.addEventListener('click', function () { acts[btn.dataset.act](); });
  });

  /* ---------- 자주 쓰는 패턴 템플릿 ---------- */

  var KEY_T = 'lyric-melody-templates-v1';
  var KEY_T_MTIME = 'lyric-melody-templates-mtime-v2';
  function templateKey() {
    return (typeof fb !== 'undefined' && fb && fb.user) ? KEY_T + ':' + fb.user.uid : KEY_T;
  }
  function templateTimeKey() {
    return (typeof fb !== 'undefined' && fb && fb.user)
      ? KEY_T_MTIME + ':' + fb.user.uid : KEY_T_MTIME;
  }
  var PRESETS = [
    { name: '올림', abbr: '↑', notes: [[0], [1]] },
    { name: '내림', abbr: '↓', notes: [[0], [-1]] },
    { name: '올렸다 내림', abbr: '↑↓', notes: [[0], [1], [-1]] },
    { name: '내렸다 올림', abbr: '↓↑', notes: [[0], [-1], [1]] },
    { name: '2단 올림', abbr: '↑↑', notes: [[0], [1], [1]] },
    { name: '2단 내림', abbr: '↓↓', notes: [[0], [-1], [-1]] },
    { name: '2단 올렸다 내림', abbr: '↑↑↓', notes: [[0], [1], [1], [-1]] },
    { name: '2단 올렸다 2단 내림', abbr: '↑↑↓↓', notes: [[0], [1], [1], [-1], [-1]] },
    { name: '2단 내렸다 2단 올림', abbr: '↓↓↑↑', notes: [[0], [-1], [-1], [1], [1]] },
    { name: '올리고 바이브', abbr: '↑바이브', notes: [[0], [1, 3]] },
    { name: '내리고 바이브', abbr: '↓바이브', notes: [[0], [-1, 3]] },
    { name: '바이브만', abbr: '바이브', notes: [[0, 3]] },
    { name: '지움', abbr: '지움', notes: [[0]] }
  ].map(function (t) {
    return { name: t.name, abbr: t.abbr, notes: t.notes.map(function (a) { return newNote(a[0], a[1]); }) };
  });

  function normalizeTpls(a) {
    if (!Array.isArray(a)) return [];
    return a.filter(function (t) { return t && Array.isArray(t.notes) && t.notes.length; })
      .map(function (t) {
        return {
          name: String(t.name || '내 패턴'),
          notes: t.notes.map(function (n, i) {
            return newNote(i === 0 ? 0 : ((n && n.d) < 0 ? -1 : 1), n && n.vn);
          })
        };
      });
  }
  function loadTpls() {
    try {
      return normalizeTpls(JSON.parse(localStorage.getItem(templateKey())));
    } catch (e) {}
    return [];
  }
  var customTpls = Array.isArray(doc.customTpls) ? normalizeTpls(doc.customTpls) : loadTpls();
  function saveTpls() {
    customTpls = normalizeTpls(customTpls);
    var templatesMtime = Date.now();
    try {
      localStorage.setItem(templateKey(), JSON.stringify(customTpls));
      localStorage.setItem(templateTimeKey(), String(templatesMtime));
    } catch (e) {}
    var owner = currentLibraryOwner();
    songLibrary.songs.forEach(function (meta) {
      var target = meta.id === activeSongId ? doc : loadSongDoc(owner, meta.id);
      if (!target) return;
      target.customTpls = normalizeTpls(customTpls);
      target.customTplsMtime = templatesMtime;
      writeSongDoc(owner, meta.id, target);
      if (fb.user) markSongDirty(fb.user.uid, meta.id, target);
    });
    saveSongLibrary(owner);
    if (fb.user && fb.syncReady) {
      songLibrary.songs.forEach(function (meta) {
        if (isUserDocDirty(fb.user.uid, meta.id)) scheduleSongSave(meta.id);
      });
    }
  }
  function tplSVG(notes) {
    var mS = 4, mW = 5, n = notes.length;
    var o = [0], i;
    for (i = 1; i < n; i++) o.push(o[i - 1] + (notes[i].d < 0 ? -1 : 1));
    var min = Math.min.apply(null, o), max = Math.max.apply(null, o);
    var anyV = notes.some(function (nt) { return nt.vn > 0; });
    var top = anyV ? 10 : 3, H = (max - min) * mS + top + 3;
    var W = Math.max(20, n * mW + 6), x0 = (W - n * mW) / 2;
    var yOf = function (idx) { return H - 3 - (o[idx] - min) * mS; };
    var d = '', txt = '';
    if (n >= 2) {
      notes.forEach(function (nt, idx) {
        var xs = x0 + idx * mW;
        d += (idx === 0 ? 'M ' : 'L ') + xs + ' ' + yOf(idx) + ' L ' + (xs + mW) + ' ' + yOf(idx);
      });
    }
    notes.forEach(function (nt, idx) {
      if (!(nt.vn > 0)) return;
      var cx = n >= 2 ? x0 + idx * mW + mW / 2 : W / 2;
      txt += '<text x="' + cx + '" y="' + (yOf(idx) - 3) + '" text-anchor="middle" font-size="7" fill="currentColor">' + nt.vn + '</text>';
    });
    return '<svg width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '">' +
      (d ? '<path d="' + d + '" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="miter" stroke-linecap="square"/>' : '') +
      txt + '</svg>';
  }

  var tplRow = $('tplRow');
  function renderTpls() {
    var html = '<span class="tpllabel">자주 쓰는 패턴</span>';
    PRESETS.forEach(function (t, i) {
      html += '<button class="tpl" data-tpl="p' + i + '" title="' + esc(t.name) + '">' + tplSVG(t.notes) + '<span>' + esc(t.abbr) + '</span></button>';
    });
    customTpls.forEach(function (t, i) {
      html += '<button class="tpl" data-tpl="c' + i + '" title="선택한 글자에 적용">' + tplSVG(t.notes) + '<span>' + esc(t.name) + '</span><span class="x" data-del="' + i + '" title="이 템플릿 삭제">×</span></button>';
    });
    html += '<button class="btn" id="tplSave" title="선택한 글자의 패턴을 템플릿으로 저장">＋ 현재 패턴 저장</button>';
    tplRow.innerHTML = html;
  }

  tplRow.addEventListener('click', function (e) {
    var del = e.target.closest ? e.target.closest('.x') : null;
    if (del) {
      customTpls.splice(+del.dataset.del, 1);
      saveTpls(); renderTpls();
      flash('템플릿을 삭제했습니다.');
      return;
    }
    if (e.target.closest && e.target.closest('#tplSave')) {
      if (!sel) { flash('저장할 글자를 먼저 선택하세요.'); return; }
      var cell = cellAt(sel);
      if (!cell || cell.space) return;
      if (cell.notes.length === 1 && !(cell.notes[0].vn > 0)) {
        flash('표시가 없는 글자는 템플릿으로 저장할 수 없습니다.');
        return;
      }
      customTpls.push({
        name: '내 패턴 ' + (customTpls.length + 1),
        notes: cell.notes.map(function (n) { return newNote(n.d, n.vn); })
      });
      saveTpls(); renderTpls();
      flash('템플릿으로 저장했습니다.');
      return;
    }
    var btn = e.target.closest ? e.target.closest('[data-tpl]') : null;
    if (!btn) return;
    var id = btn.dataset.tpl;
    var t = id[0] === 'p' ? PRESETS[+id.slice(1)] : customTpls[+id.slice(1)];
    if (!t) return;
    if (!sel) { flash('먼저 적용할 글자를 클릭하세요.'); return; }
    var target = cellAt(sel);
    if (!target || target.space) return;
    target.notes = t.notes.map(function (n, i) { return newNote(i === 0 ? 0 : n.d, n.vn); });
    sel.ni = 0;
    update();
    flash("'" + t.name + "' 패턴을 적용했습니다.");
  });

  /* ---------- 마우스 / 터치 ---------- */

  sheet.addEventListener('pointerdown', function (e) {
    var el = e.target.closest ? e.target.closest('.cell') : null;
    if (!el || el.dataset.li === undefined) return;
    var li = +el.dataset.li, ci = +el.dataset.ci;
    var cell = doc.lines[li][ci];
    var rect = el.getBoundingClientRect();
    var n = cell.notes.length, ni = 0;
    if (n > 1) {
      var x0 = (rect.width - n * NOTE_W) / 2;
      ni = clamp(Math.floor((e.clientX - rect.left - x0) / NOTE_W), 0, n - 1);
    }
    sel = { li: li, ci: ci, ni: ni };
    if (ni > 0) {
      drag = { y0: e.clientY, moved: false };
      window.addEventListener('pointermove', onMove);
      window.addEventListener('pointerup', onUp, { once: true });
    }
    e.preventDefault();
    render();
  });
  function onMove(e) {
    if (!drag || !sel || sel.ni === 0) return;
    var dy = drag.y0 - e.clientY;
    if (Math.abs(dy) < 5) return;
    var nd = dy > 0 ? 1 : -1;
    var cell = cellAt(sel);
    var nt = cell.notes[sel.ni];
    if (nt.d !== nd) {
      var prevD = nt.d;
      nt.d = nd;
      if (dirRunTooLong(cell.notes)) { nt.d = prevD; return; }
      drag.moved = true;
      render();
    }
  }
  function onUp() {
    window.removeEventListener('pointermove', onMove);
    if (drag && drag.moved) save();
    drag = null;
  }

  /* ---------- 키보드 ---------- */

  document.addEventListener('keydown', function (e) {
    if (e.target && e.target.closest &&
        e.target.closest('textarea, input, select, button, a, audio, [contenteditable]')) return;
    if (gateEl && !gateEl.hidden) return;
    var k = e.key;
    if (mode === 'time') {
      if (k === ' ') { playPause(); e.preventDefault(); }
      else if (k === 'Enter') { tapPlace(); e.preventDefault(); }
      else if (k === 'ArrowUp') { tlSetDir(1); e.preventDefault(); }
      else if (k === 'ArrowDown') { tlSetDir(-1); e.preventDefault(); }
      else if (k === 'Backspace' || k === 'Delete') {
        if (e.shiftKey) tlUnplace();
        else tlDelNote();
        e.preventDefault();
      }
      else if (/^[0-9]$/.test(k)) {
        bufferedDigit(+k, function () {
          var c = tlCell();
          return c ? (c.notes[tlSel.ni].vn || 0) : 0;
        }, tlVib);
      }
      else if (k === 'ArrowLeft') { seekTo(curTime() - 2); e.preventDefault(); }
      else if (k === 'ArrowRight') { seekTo(curTime() + 2); e.preventDefault(); }
      else if (k === 'Home') { seekTo(0); tlScroll.scrollLeft = 0; e.preventDefault(); }
      return;
    }
    if (k === 'ArrowLeft') { moveSel(-1); e.preventDefault(); }
    else if (k === 'ArrowRight') { moveSel(1); e.preventDefault(); }
    else if (k === 'ArrowUp') { setDir(1); e.preventDefault(); }
    else if (k === 'ArrowDown') { setDir(-1); e.preventDefault(); }
    else if (k === 'Enter') { addNote(); e.preventDefault(); }
    else if (k === 'Backspace' || k === 'Delete') { delNote(); e.preventDefault(); }
    else if (/^[0-9]$/.test(k)) {
      bufferedDigit(+k, function () {
        var c = cellAt(sel);
        return c && sel ? (c.notes[sel.ni].vn || 0) : 0;
      }, vibSet);
    }
  });

  /* ---------- 상단 버튼 ---------- */

  $('applyBtn').addEventListener('click', function () {
    doc.lyrics = lyricsIn.value;
    doc.lines = linesFrom(doc.lyrics, doc.lines);
    sel = firstSel();
    update();
    flash('가사를 적용했습니다. 같은 자리의 같은 글자는 음이 유지됩니다.');
  });

  $('saveBtn').addEventListener('click', function () {
    update();
    if (fb.user && fb.syncReady) {
      var uid = fb.user.uid, generation = fb.generation, songId = activeSongId;
      var localDoc = cloneDoc(doc);
      pushSong(songId, false).then(function (result) {
        if (!result || result.ok || result.cancelled || !isCurrentSync(uid, generation)) return;
        if (errCode(result.error) === 'cloud/conflict') {
          refreshConflict(localDoc, uid, generation, songId);
        } else syncFailure(result.error, localDoc, uid, generation, songId);
      });
    } else {
      flash('이 PC에 저장됐습니다. 클라우드 연결 후 다시 동기화됩니다.');
    }
  });
  $('printBtn').addEventListener('click', function () { window.print(); });

  var resetArmed = false, resetBtn = $('resetBtn');
  resetBtn.addEventListener('click', function () {
    if (!resetArmed) {

    /* 두 레인: 위 = 원곡, 아래 = MR (꺼진 트랙은 흐리게) */
    [['orig', 33, ink], ['mr', 74, acc]].forEach(function (lane) {
      var tr = tracks[lane[0]];
      if (!tr.peaks) return;
      var mid = lane[1], half = 19;
      ctx.fillStyle = lane[2];
      ctx.globalAlpha = tr.on ? 0.75 : 0.22;
      for (var x2 = 0; x2 < w; x2++) {
        var b0 = Math.floor(x2 / pps * tr.peaks.perSec);
        var b1 = Math.max(b0 + 1, Math.floor((x2 + 1) / pps * tr.peaks.perSec));
        var lo2 = 1, hi2 = -1;
        for (var b = b0; b < b1 && b < tr.peaks.mins.length; b++) {
          if (tr.peaks.mins[b] < lo2) lo2 = tr.peaks.mins[b];
          if (tr.peaks.maxs[b] > hi2) hi2 = tr.peaks.maxs[b];
        }
        if (hi2 < lo2) continue;
        var y0 = mid - hi2 * half;
        ctx.fillRect(x2, y0, 1, Math.max(1, (mid - lo2 * half) - y0));
      }
    });
    ctx.globalAlpha = 1;
  }

  /* ---------- 16비트 격자 ---------- */
  var bpmIn = $('bpmIn'), offIn = $('offIn'), snapChk = $('snapChk');

  function gridStep() {
    var bpm = +doc.bpm;
    return bpm > 0 ? 60 / bpm / 4 : 0;
  }
  function snapT(t) {
    var st = gridStep();
    if (!st) return t;
    var off = +doc.gridOff || 0;
    return Math.max(0, off + Math.round((t - off) / st) * st);
  }
  function gridInit() {
    bpmIn.value = (typeof doc.bpm === 'number' && doc.bpm > 0) ? doc.bpm : '';
    offIn.value = (typeof doc.gridOff === 'number') ? doc.gridOff : '';
  }
  bpmIn.addEventListener('change', function () {
    doc.bpm = +this.value || 0;
    save(); drawGrid();
  });
  offIn.addEventListener('change', function () {
    doc.gridOff = +this.value || 0;
    save(); drawGrid();
  });

  function drawGrid() {
    var g = $('grid');
    var duration = dur(), st = gridStep();
    var w = Math.min(32000, Math.ceil(duration * pps));
    g.width = w || 1;
    g.style.width = (w || 1) + 'px';
    if (!duration || !st) return;
    var ctx = g.getContext('2d');
    ctx.clearRect(0, 0, w, 182);
    ctx.strokeStyle = cssVar('--muted') || '#888';
    ctx.lineWidth = 1;
    var off = +doc.gridOff || 0;
    var k0 = Math.ceil((0 - off) / st);
    for (var k = k0; ; k++) {
      var t = off + k * st;
      if (t > duration) break;
      var m = ((k % 16) + 16) % 16;
      /* 모눈종이식: 마디 = 실선, 박 = 긴 점선, 16비트 = 잔점선 */
      if (m === 0) { ctx.setLineDash([]); ctx.globalAlpha = 0.5; }
      else if (m % 4 === 0) { ctx.setLineDash([6, 3]); ctx.globalAlpha = 0.35; }
      else { ctx.setLineDash([2, 3]); ctx.globalAlpha = 0.22; }
      var x = Math.round(t * pps) + 0.5;
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, 182);
      ctx.stroke();
    }
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;
  }

  function placedList() {
    var arr = [];
    doc.lines.forEach(function (line, li) {
      line.forEach(function (c, ci) {
        if (!c.space && !c.sustain && typeof c.t === 'number') arr.push({ li: li, ci: ci, cell: c });
      });
    });
    arr.sort(function (a, b) { return a.cell.t - b.cell.t; });
    return arr;
  }
  function queueList() {
    return nonSpacePositions().filter(function (p) {
      return typeof doc.lines[p.li][p.ci].t !== 'number';
    });
  }
  function renderQueue() {
    var q = queueList();
    var html = '<span class="qlab">다음 배치 (' + q.length + '자 남음)</span>';
    q.slice(0, 18).forEach(function (p, i) {
      html += '<span class="q' + (i === 0 ? ' first' : '') + '">' + esc(doc.lines[p.li][p.ci].ch) + '</span>';
    });
    if (!q.length) html = '<span class="qlab">모든 글자 배치됨</span>';
    queueEl.innerHTML = html;
  }
  function renderTlSyls() {
    tlSyls.innerHTML = placedList().map(function (p) {
      var isSel = tlSel && tlSel.li === p.li && tlSel.ci === p.ci;
      return '<div class="tl-syl' + (isSel ? ' sel' : '') + '" data-li="' + p.li + '" data-ci="' + p.ci +
        '" style="left:' + (p.cell.t * pps) + 'px">' +
        (isSel ? '<span class="tlx" title="배치 해제 (Shift+Delete)">✕</span>' : '') +
        glyphSVG(p.cell, isSel ? tlSel.ni : -1, true) +
        '<div class="tch">' + esc(p.cell.ch) + '</div></div>';
    }).join('');
    lastNowKey = '';
  }
  /* 이미 겹쳐 저장된 글자들을 최소 간격으로 벌림 (규칙 도입 전 데이터 정리) */
  function fixOverlaps() {
    var st = gridStep() || 0.125;
    var pl = placedList();
    var changed = false;
    for (var i = 1; i < pl.length; i++) {
      if (pl[i].cell.t < pl[i - 1].cell.t + st * 0.9) {
        pl[i].cell.t = Math.round((pl[i - 1].cell.t + st) * 1000) / 1000;
        changed = true;
      }
    }
    if (changed) save();
  }
  function layoutTimeline() { gridInit(); fixOverlaps(); drawGrid(); drawWave(); renderTlSyls(); renderQueue(); updatePlayhead(true); }

  function updatePlayhead(force) {
    var duration = dur();
    var t = curTime();
    playheadEl.style.left = (t * pps) + 'px';
    timeDisp.textContent = fmt(t) + ' / ' + fmt(duration || 0);
    var pl = placedList(), cur = null, i;
    for (i = 0; i < pl.length; i++) {
      if (pl[i].cell.t <= t) cur = pl[i];
      else break;
    }
    var key = cur ? cur.li + '-' + cur.ci : '';
    if (key !== lastNowKey || force) {
      lastNowKey = key;
      tlSyls.querySelectorAll('.tl-syl.now').forEach(function (el) { el.classList.remove('now'); });
      if (cur) {
        var el2 = tlSyls.querySelector('.tl-syl[data-li="' + cur.li + '"][data-ci="' + cur.ci + '"]');
        if (el2) el2.classList.add('now');
      }
    }
    if (playing && !pan) {
      /* 재생 헤드가 화면 45% 지점을 넘으면 그 자리에 고정한 채 매 프레임 부드럽게 따라감 */
      var px = t * pps, vw = tlScroll.clientWidth;
      if (px - tlScroll.scrollLeft > vw * 0.45) {
        tlScroll.scrollLeft = Math.max(0, px - vw * 0.45);
      }
    }
    if (recordSession && recordSession.phase === 'recording') {
      recordStatus.textContent = '● 녹음 중 ' + fmt(Math.max(0, t - recordSession.startOffset)) + ' · ' +
        (recordSession.includeMr ? 'MR+목소리' : '목소리만');
    }
  }
  function rafLoop() {
    if (recordSession && recordSession.phase === 'recording' &&
        curTime() >= recordSession.endAt) {
      stopRecording(false);
      rafId = null;
      return;
    }
    if ((!recordSession || recordSession.phase !== 'recording') &&
        playing && curTime() >= dur() - 0.02) {
      playing = false;
      stopSources();
      playOff = dur();
      playBtn.textContent = '▶ 재생';
    }
    updatePlayhead();
    rafId = playing ? requestAnimationFrame(rafLoop) : null;
  }

  /* 격자 한 칸에는 글자 하나 — 동시에 두 글자를 말할 수 없음 */
  function slotTaken(t, li, ci) {
    var st = gridStep() || 0.125;
    var pl = placedList();
    for (var i = 0; i < pl.length; i++) {
      var p = pl[i];
      if (p.li === li && p.ci === ci) continue;
      if (Math.abs(p.cell.t - t) < st * 0.5) return true;
    }
    return false;
  }
  function tapPlace() {
    if (!anyLoaded()) { flash('먼저 오디오를 불러오세요.'); return; }
    var q = queueList()[0];
    if (!q) { flash('모든 글자가 이미 배치됐습니다.'); return; }
    var tt = curTime();
    if (snapChk.checked) tt = snapT(tt);
    var st = gridStep() || 0.125;
    while (slotTaken(tt, q.li, q.ci)) tt += st;  /* 차 있으면 다음 빈 칸으로 (격자 없어도 최소 간격) */
    doc.lines[q.li][q.ci].t = Math.round(tt * 1000) / 1000;
    save();
    renderTlSyls();
    renderQueue();
  }
  tapBtn.addEventListener('click', tapPlace);

  function shiftAll(mult, e) {
    var st = gridStep() || 0.1;
    var d = st * mult * (e && e.shiftKey ? 4 : 1);
    var pl = placedList();
    if (!pl.length) { flash('배치된 글자가 없습니다.'); return; }
    if (d < 0) {
      var minT = Math.min.apply(null, pl.map(function (p) { return p.cell.t; }));
      if (minT + d < -1e-6) { flash('더 왼쪽으로 이동할 수 없습니다.'); return; }
    }
    pl.forEach(function (p) { p.cell.t = Math.round((p.cell.t + d) * 1000) / 1000; });
    save();
    renderTlSyls();
    updatePlayhead(true);
  }
  $('shiftL').addEventListener('click', function (e) { shiftAll(-1, e); });
  $('shiftR').addEventListener('click', function (e) { shiftAll(1, e); });

  /* 빈 곳 드래그 = 가로 스크롤(팬), 짧은 클릭 = 그 위치로 이동 */
  var pan = null;
  tlInner.addEventListener('pointerdown', function (e) {
    if (e.target.closest && e.target.closest('.tl-syl')) return;
    if (!anyLoaded()) return;
    pan = { x0: e.clientX, s0: tlScroll.scrollLeft, moved: false };
    window.addEventListener('pointermove', panMove);
    window.addEventListener('pointerup', panUp, { once: true });
    e.preventDefault();
  });
  function panMove(e) {
    if (!pan) return;
    if (Math.abs(e.clientX - pan.x0) > 4) {
      pan.moved = true;
      tlInner.classList.add('panning');
    }
    if (pan.moved) tlScroll.scrollLeft = pan.s0 - (e.clientX - pan.x0);
  }
  function panUp(e) {
    window.removeEventListener('pointermove', panMove);
    tlInner.classList.remove('panning');
    if (pan && !pan.moved) {
      var rect = tlInner.getBoundingClientRect();
      seekTo((e.clientX - rect.left) / pps);
    }
    pan = null;
  }

  var tlDrag = null;
  tlSyls.addEventListener('pointerdown', function (e) {
    var xBtn = e.target.closest ? e.target.closest('.tlx') : null;
    if (xBtn) {
      tlUnplace();
      e.preventDefault();
      e.stopPropagation();
      return;
    }
    var el = e.target.closest ? e.target.closest('.tl-syl') : null;
    if (!el) return;
    var li = +el.dataset.li, ci = +el.dataset.ci;
    var cell = doc.lines[li][ci];
    var rect = el.getBoundingClientRect();
    var n = cell.notes.length, ni = 0;
    if (n > 1) {
      /* 왼쪽 정렬 글리프: padding 3px + 계단 시작 2px */
      ni = clamp(Math.floor((e.clientX - rect.left - 5) / NOTE_W), 0, n - 1);
    }
    tlSel = { li: li, ci: ci, ni: ni };
    tlDrag = { x0: e.clientX, t0: cell.t, moved: false };
    window.addEventListener('pointermove', tlMove);
    window.addEventListener('pointerup', tlUp, { once: true });
    e.preventDefault();
    e.stopPropagation();
    renderTlSyls();
  });
  function tlMove(e) {
    if (!tlDrag || !tlSel) return;
    var nt = clamp(tlDrag.t0 + (e.clientX - tlDrag.x0) / pps, 0, dur() || 1e9);
    if (snapChk.checked) nt = snapT(nt);
    if (slotTaken(nt, tlSel.li, tlSel.ci)) return;  /* 차 있는 칸/간격 안으로는 이동 불가 */
    doc.lines[tlSel.li][tlSel.ci].t = Math.round(nt * 1000) / 1000;
    tlDrag.moved = true;
    var el = tlSyls.querySelector('.tl-syl[data-li="' + tlSel.li + '"][data-ci="' + tlSel.ci + '"]');
    if (el) el.style.left = (doc.lines[tlSel.li][tlSel.ci].t * pps) + 'px';
  }
  function tlUp() {
    window.removeEventListener('pointermove', tlMove);
    if (tlDrag && tlDrag.moved) { save(); renderTlSyls(); }
    tlDrag = null;
  }

  function setPps(v) {
    pps = v;
    try { localStorage.setItem('tl-pps', String(pps)); } catch (e) {}
    layoutTimeline();
  }
  $('zoomIn').addEventListener('click', function () { setPps(Math.min(240, pps * 2)); });
  $('zoomOut').addEventListener('click', function () { setPps(Math.max(15, pps / 2)); });

  var clearArmed = false, clearBtn = $('clearTimes');
  clearBtn.addEventListener('click', function () {
    if (!clearArmed) {
      clearArmed = true;
      clearBtn.textContent = '정말 지울까요?';
      setTimeout(function () { clearArmed = false; clearBtn.textContent = '배치 전체 지우기'; }, 2500);
      return;
    }
    clearArmed = false;
    clearBtn.textContent = '배치 전체 지우기';
    doc.lines.forEach(function (line) { line.forEach(function (c) { delete c.t; }); });
    tlSel = null;
    save();
    layoutTimeline();
  });

  function tlCell() { return tlSel ? doc.lines[tlSel.li][tlSel.ci] : null; }
  function tlSetDir(d) {
    var c = tlCell();
    if (!c) { flash('타임라인의 글자를 먼저 클릭하세요.'); return; }
    if (tlSel.ni === c.notes.length - 1) {
      c.notes.push(newNote(d));
      if (dirRunTooLong(c.notes)) {
        c.notes.pop();
        flash('같은 방향으로는 3음까지만 이어집니다 (신체 구조상 한계).');
        return;
      }
      tlSel.ni = c.notes.length - 1;
    } else if (tlSel.ni > 0) {
      var prevD = c.notes[tlSel.ni].d;
      c.notes[tlSel.ni].d = d;
      if (dirRunTooLong(c.notes)) {
        c.notes[tlSel.ni].d = prevD;
        flash('같은 방향으로는 3음까지만 이어집니다 (신체 구조상 한계).');
        return;
      }
    } else {
      flash('첫 음은 기준이라 방향이 없습니다.');
      return;
    }
    save(); renderTlSyls();
  }
  function tlDelNote() {
    var c = tlCell();
    if (!c) return;
    if (c.notes.length > 1) {
      c.notes.splice(tlSel.ni, 1);
      c.notes[0].d = 0;
      tlSel.ni = clamp(tlSel.ni, 0, c.notes.length - 1);
    } else {
      c.notes[0] = newNote();
    }
    save(); renderTlSyls();
  }
  function tlVib(n2) {
    var c = tlCell();
    if (!c) return;
    c.notes[tlSel.ni].vn = n2;
    save(); renderTlSyls();
  }
  function tlVibDelta(d) {
    var c = tlCell();
    if (!c) { flash('타임라인의 글자를 먼저 클릭하세요.'); return; }
    var nt = c.notes[tlSel.ni];
    nt.vn = Math.max(0, Math.min(99, (nt.vn || 0) + d));
    save(); renderTlSyls();
  }
  $('tlVibUp').addEventListener('click', function () { tlVibDelta(1); });
  $('tlVibDown').addEventListener('click', function () { tlVibDelta(-1); });
  function tlUnplace() {
    if (!tlSel) return;
    delete doc.lines[tlSel.li][tlSel.ci].t;
    tlSel = null;
    save(); renderTlSyls(); renderQueue();
  }

  function setTab(m) {
    if (mode === 'time' && m !== 'time' && recordSession) {
      if (recordSession.phase === 'recording') recordSession.notice = '화면 전환으로 녹음을 종료했습니다';
      stopRecording(false);
    }
    mode = m;
    document.querySelectorAll('.tab').forEach(function (b) { b.classList.toggle('active', b.dataset.tab === m); });
    [$('lyricsRow'), $('actions'), tplRow, sheet, $('ioBox')].forEach(function (el) { el.hidden = m !== 'edit'; });
    [$('timeControls'), recordControls, $('ytRow'), queueEl, timePane].forEach(function (el) { el.hidden = m !== 'time'; });
    if (m === 'time') layoutTimeline();
    else render();
  }
  document.querySelectorAll('.tab').forEach(function (b) {
    b.addEventListener('click', function () { setTab(b.dataset.tab); });
  });
  /* ---------- 클라우드 동기화 (Firebase) ---------- */

  var FB_CDN = 'https://www.gstatic.com/firebasejs/10.14.1/';
  var fb = {
    mods: null, auth: null, db: null, stg: null, user: null,
    timer: null, syncReady: false, pendingConflict: null,
    generation: 0, songStates: {},
    writeEpoch: 0, conflictRequest: 0,
    logoutPending: false
  };
  var cloudStateEl = $('cloudState');
  var gateEl = $('gate'), gateMsg = $('gateMsg'), gateLogin = $('gateLogin'),
    gateCloud = $('gateCloud'), gateLocal = $('gateLocal'), gateBoth = $('gateBoth'), gateRetry = $('gateRetry'),
    gateHosted = $('gateHosted'), gateOffline = $('gateOffline'), appRoot = $('appRoot');

  function gateShow(msg, actions) {
    actions = actions || {};
    try { recordPreview.pause(); } catch (e) {}
    if (recordSession) {
      if (recordSession.phase === 'recording') recordSession.notice = '클라우드 안내로 녹음을 종료했습니다';
      stopRecording(false);
    } else pauseTimelinePlayback();
    gateEl.hidden = false;
    gateMsg.textContent = msg;
    gateLogin.style.display = actions.login ? '' : 'none';
    gateCloud.style.display = actions.cloud ? '' : 'none';
    gateLocal.style.display = actions.local ? '' : 'none';
    gateBoth.style.display = actions.both ? '' : 'none';
    gateRetry.style.display = actions.retry ? '' : 'none';
    gateHosted.style.display = actions.hosted ? '' : 'none';
    gateOffline.style.display = actions.offline ? '' : 'none';
    appRoot.inert = true;
    setTimeout(function () {
      var firstAction = [gateLogin, gateBoth, gateCloud, gateLocal, gateRetry, gateHosted, gateOffline]
        .find(function (el) { return el.style.display !== 'none'; });
      if (firstAction) firstAction.focus();
    }, 0);
  }
  function gateHide() { gateEl.hidden = true; appRoot.inert = false; }

  function cloudStatus(msg) { cloudStateEl.textContent = msg; }
  function errCode(e) { return (e && e.code) || String(e || '알 수 없는 오류'); }
  function fbBtns() {
    $('fbLogin').disabled = !fb.auth || !!fb.user;
    $('fbLogin').textContent = fb.user ? '로그인됨 ✓' : 'Google로 로그인';
    $('fbPull').disabled = !fb.user;
    $('fbLogout').disabled = !fb.user;
  }

  function fbInit(cfg) {
    if (location.protocol === 'file:') {
      cloudStatus('웹 주소에서 열어주세요');
      gateShow('index.html 파일을 직접 열면 Google 로그인을 사용할 수 없습니다.\n운영 웹 앱 주소로 접속해 주세요.', {
        hosted: true
      });
      return;
    }
    cloudStatus('SDK 불러오는 중…');
    Promise.all([
      import(FB_CDN + 'firebase-app.js'),
      import(FB_CDN + 'firebase-auth.js'),
      import(FB_CDN + 'firebase-firestore.js'),
      import(FB_CDN + 'firebase-storage.js')
    ]).then(function (m) {
      fb.mods = { app: m[0], au: m[1], fs: m[2], st: m[3] };
      var app = fb.mods.app.initializeApp(cfg);
      fb.auth = fb.mods.au.getAuth(app);
      fb.db = fb.mods.fs.getFirestore(app);
      fb.stg = fb.mods.st.getStorage(app);
      cloudStatus('연결됨 — 로그인하세요');
      fbBtns();
      fb.mods.au.onAuthStateChanged(fb.auth, function (u) {
        if (fb.timer) clearTimeout(fb.timer);
        fb.timer = null;
        fb.generation++;
        fb.writeEpoch++;
        fb.conflictRequest++;
        Object.keys(fb.songStates).forEach(function (songId) {
          if (fb.songStates[songId].timer) clearTimeout(fb.songStates[songId].timer);
        });
        fb.songStates = {};
        clearAudioTracks();
        fb.user = u;
        updateRecordUI();
        fb.syncReady = false;
        fb.pendingConflict = null;
        fb.logoutPending = false;
        fbBtns();
        if (u) {
          syncOnLogin();
        } else {
          cloudStatus('연결됨 — 로그인하세요');
          gateShow('같은 Google 계정으로 로그인하면 다른 기기의 작업을 불러옵니다.', { login: true });
        }
      });
    }).catch(function (e) {
      cloudStatus('연결 실패: ' + errCode(e));
      gateShow('클라우드 연결에 실패했습니다. 네트워크를 확인하세요.\n' + errCode(e), {
        retry: true, hosted: true
      });
      flash('Firebase SDK 로드 실패: ' + e);
    });
  }

  function signIn() {
    if (!fb.auth) return;
    fb.mods.au.signInWithPopup(fb.auth, new fb.mods.au.GoogleAuthProvider())
      .catch(function (e) {
        var code = errCode(e);
        var unauthorized = code === 'auth/unauthorized-domain';
        cloudStatus('로그인 실패: ' + code);
        gateShow(unauthorized
          ? '현재 주소는 Firebase 로그인 허용 도메인이 아닙니다.\n운영 웹 앱 주소로 접속해 주세요.'
          : 'Google 로그인에 실패했습니다.\n' + code, {
          login: true, hosted: unauthorized
        });
      });
